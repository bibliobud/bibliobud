/follows/{username}:
  parameters:
    - name: username
      in: path
      required: true
      schema:
        type: string

  post:
    summary: Follow a user
    operationId: followsCreate
    tags: [follows]
    responses:
      "204":
        description: Now following (or already was — idempotent).
      "401":
        $ref: ../components/responses/Problem401.yaml
      "404":
        $ref: ../components/responses/Problem404.yaml

  delete:
    summary: Unfollow a user
    operationId: followsDelete
    tags: [follows]
    responses:
      "204":
        description: No longer following.
      "401":
        $ref: ../components/responses/Problem401.yaml
      "404":
        $ref: ../components/responses/Problem404.yaml

/users/me/following:
  get:
    summary: List users the current user follows
    operationId: followsListFollowing
    tags: [follows]
    parameters:
      - $ref: ../components/parameters/Cursor.yaml
      - $ref: ../components/parameters/Limit.yaml
    responses:
      "200":
        description: Page of users.
        content:
          application/json:
            schema:
              allOf:
                - $ref: ../components/schemas/Pagination.yaml
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../components/schemas/User.yaml
      "401":
        $ref: ../components/responses/Problem401.yaml

/users/me/followers:
  get:
    summary: List users following the current user
    operationId: followsListFollowers
    tags: [follows]
    parameters:
      - $ref: ../components/parameters/Cursor.yaml
      - $ref: ../components/parameters/Limit.yaml
    responses:
      "200":
        description: Page of users.
        content:
          application/json:
            schema:
              allOf:
                - $ref: ../components/schemas/Pagination.yaml
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../components/schemas/User.yaml
      "401":
        $ref: ../components/responses/Problem401.yaml
